<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Algorithm Parent</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #182033;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #dbe3f1;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        color: #56637a;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        margin-top: 12px;
        border-radius: 6px;
        background: #1d4ed8;
        color: #fff;
        font-weight: 700;
        padding: 10px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Set Algorithm 부모 대시보드</h1>
      <p>부모 대시보드는 서버에서 열어야 자녀 기기 정책을 저장하고 동기화할 수 있습니다.</p>
      <p>터미널에서 <strong>node server.js</strong>를 실행한 뒤 아래 주소로 접속하세요.</p>
      <a href="http://localhost:3000/parent">http://localhost:3000/parent 열기</a>
    </main>
  </body>
</html>
