services:
  - type: web
    name: set-algorithm-remote
    runtime: node
    plan: starter
    buildCommand: "true"
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: set-algorithm-data
      mountPath: /var/data
      sizeGB: 1
