<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Algorithm</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Set Algorithm</h1>

      <label class="field">
        <span>현재 패키지</span>
        <select id="packageSelect"></select>
      </label>

      <div class="panel">
        <h2>필터 정책</h2>
        <div id="packageSummary">로딩 중...</div>
      </div>

      <div class="panel">
        <h2>최근 필터 결과</h2>
        <div id="filterStats">아직 분석 결과가 없습니다.</div>
      </div>

      <div class="panel">
        <h2>키워드 관리</h2>
        <button id="manageKeywordsButton">키워드 팝업 열기</button>
      </div>

      <div class="panel">
        <h2>원격 제어</h2>
        <label class="check-row">
          <input id="remoteSyncEnabled" type="checkbox" />
          <span>부모 대시보드 정책 동기화</span>
        </label>
        <label class="field">
          <span>서버 주소</span>
          <input id="remoteServerUrl" type="text" placeholder="http://localhost:3000" />
        </label>
        <label class="field">
          <span>가족 키</span>
          <input id="remoteFamilyKey" type="password" autocomplete="off" placeholder="Render에 설정한 FAMILY_KEY" />
        </label>
        <div class="small">기기 ID: <strong id="remoteDeviceId">-</strong></div>
        <div id="remoteSyncStatus" class="small">동기화 상태를 확인 중입니다.</div>
        <div class="button-row">
          <button id="saveRemoteSettingsButton">저장</button>
          <button id="syncRemoteNowButton" type="button">지금 동기화</button>
        </div>
      </div>
    </div>
    <script src="packages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
