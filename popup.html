<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Algorithm</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Set Algorithm</h1>
      <p>현재 목표에 맞는 패키지를 선택하세요.</p>
      <select id="packageSelect">
        <option value="study">Study Pack</option>
        <option value="workout">Workout Pack</option>
        <option value="development">Development Pack</option>
        <option value="reading">Reading Pack</option>
      </select>
      <button id="saveButton">적용</button>

      <div class="panel">
        <h2>현재 패키지</h2>
        <div id="packageSummary">로딩 중...</div>
      </div>

      <div class="panel">
        <h2>최근 필터 결과</h2>
        <div id="filterStats">아직 분석된 내용이 없습니다.</div>
      </div>

      <div class="panel">
        <h2>키워드 관리</h2>
        <button id="manageKeywordsButton">키워드 팝업 열기</button>
      </div>
    </div>
    <script src="packages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
