<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Algorithm Remote</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Set Algorithm Remote</h1>
          <p>부모가 정한 패키지와 키워드를 자녀 기기의 Chrome 확장 프로그램으로 동기화합니다.</p>
        </div>
        <div id="serverStatus" class="status">서버 확인 중</div>
      </header>

      <section id="authPanel" class="panel auth-panel">
        <div>
          <h2>가족 인증</h2>
          <p class="hint">Render 배포 때 설정한 FAMILY_KEY를 입력하세요.</p>
        </div>
        <label>
          <span>가족 키</span>
          <input id="familyKeyInput" type="password" autocomplete="current-password" />
        </label>
        <button id="connectFamilyButton" type="button">관리 시작</button>
      </section>

      <section class="control-grid protected-content" hidden>
        <div class="panel device-panel">
          <h2>기기 연결</h2>
          <label>
            <span>자녀 기기 ID</span>
            <input id="deviceIdInput" type="text" placeholder="예: kid-12ab34cd" />
          </label>
          <div class="button-row">
            <button id="loadDeviceButton">불러오기</button>
            <button id="refreshDevicesButton" class="secondary" type="button">목록 새로고침</button>
          </div>
          <p class="hint">기기 ID는 자녀 쪽 확장 프로그램 팝업의 원격 제어 영역에 표시됩니다.</p>
          <div id="deviceList" class="device-list"></div>
        </div>

        <div class="panel stats-panel">
          <h2>현재 상태</h2>
          <div id="policyMeta" class="meta-list">정책을 불러오세요.</div>
          <div id="statsBox" class="stats-box">아직 필터링 결과가 없습니다.</div>
        </div>
      </section>

      <section class="panel policy-panel protected-content" hidden>
        <div class="panel-heading">
          <div>
            <h2>필터 정책</h2>
            <p>기본 키워드는 packages.js에서 자동으로 표시되며, 관리자 추가 키워드만 삭제할 수 있습니다.</p>
          </div>
          <button id="savePolicyButton">정책 저장</button>
        </div>

        <div class="form-grid">
          <label>
            <span>패키지</span>
            <select id="packageSelect">
              <option value="kids">Kids Safe Pack</option>
              <option value="study">Study Pack</option>
              <option value="workout">Workout Pack</option>
              <option value="development">Development Pack</option>
              <option value="reading">Reading Pack</option>
            </select>
          </label>

          <label>
            <span>필터 모드</span>
            <select id="filterModeSelect">
              <option value="blocklist">차단 키워드만 숨기기</option>
              <option value="allowlist">허용 키워드가 있는 영상만 보이기</option>
              <option value="purpose">패키지 목적 점수로 판단</option>
            </select>
          </label>
        </div>

        <div class="keyword-columns">
          <div class="keyword-column">
            <h3>허용 키워드</h3>
            <div class="keyword-input-row">
              <input id="includeKeywordInput" type="text" placeholder="예: 과학, 동화, 교육" />
              <button id="addIncludeButton" type="button">추가</button>
            </div>
            <div id="includeKeywordList" class="keyword-list"></div>
          </div>

          <div class="keyword-column">
            <h3>차단 키워드</h3>
            <div class="keyword-input-row">
              <input id="excludeKeywordInput" type="text" placeholder="예: 폭력, 공포, 자극" />
              <button id="addExcludeButton" type="button">추가</button>
            </div>
            <div id="excludeKeywordList" class="keyword-list"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/shared/packages.js"></script>
    <script src="app.js"></script>
  </body>
</html>
